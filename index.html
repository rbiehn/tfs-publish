<!DOCTYPE html>
<!-- TFS PUBLISH APP | rbiehn.github.io/tfs-publish | Version 46 | March 19, 2026 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TFS Publish">
  <meta name="theme-color" content="#f4f4f8">
  <meta name="description" content="The First Stone publishing workflow tool">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>TFS Publish</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      background: #f4f4f8; 
      color: #1a1a2e; 
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-size: 15px;
      line-height: 1.5;
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    input, select, textarea, button { font-family: inherit; transition: all 0.15s ease; }
    input[type="text"], input[type="date"], input[type="time"], select, textarea {
      font-size: 16px !important;
    }
    button { cursor: pointer; }
    button:active { transform: scale(0.97); }
    @supports(padding: max(0px)) {
      body { 
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }
    ::-webkit-scrollbar { width: 0; height: 0; }
    .tfs-app { max-width: 600px !important; }
    @media (min-width: 768px) { .tfs-app { max-width: 760px !important; } }
    @media (min-width: 1024px) { .tfs-app { max-width: 880px !important; } }
    @media (min-width: 1400px) { .tfs-app { max-width: 1000px !important; } }
    .pwa-loading {
      display: flex; align-items: center; justify-content: center; 
      min-height: 100vh; background: #f4f4f8; flex-direction: column; gap: 20px;
    }
    .pwa-loading span { 
      font-size: 13px; font-weight: 800; letter-spacing: 3px; 
      color: #f97316; text-transform: uppercase;
    }
    .pwa-loading .dot {
      width: 10px; height: 10px; border-radius: 50%; background: #f97316;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .pwa-loading .sub { font-size: 12px; font-weight: 400; letter-spacing: 0; color: #999; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #f97316 !important;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="pwa-loading">
      <span>TFS Publish</span>
      <div class="dot"></div>
      <span class="sub">Loading...</span>
    </div>
  </div>

  <!-- CDN Dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Plain JS modules (no JSX, no Babel needed) -->
  <script src="constants.js"></script>
  <script src="utils.js"></script>

  <!-- Babel + React modules -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="components.js"></script>
  <script type="text/babel" src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js").then(
          function(reg) { console.log("SW registered:", reg.scope); },
          function(err) { console.log("SW failed:", err); }
        );
      });
    }
  </script>
</body>
</html>
